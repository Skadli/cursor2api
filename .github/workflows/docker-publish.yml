name: Docker Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.repository_owner }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Prepare image metadata
        id: prep
        shell: bash
        run: |
          set -euo pipefail

          image_name="${{ vars.IMAGE_NAME }}"
          if [ -z "$image_name" ]; then
            image_name="${{ github.repository }}"
          fi

          image_name="$(echo "$image_name" | tr '[:upper:]' '[:lower:]')"
          ref_name="${{ github.event.repository.default_branch }}"
          ref_name="$(echo "$ref_name" | tr '/' '-')"
          short_sha="$(git rev-parse --short=7 HEAD)"
          full_sha="$(git rev-parse HEAD)"

          {
            echo "image_name=$image_name"
            echo "ref_name=$ref_name"
            echo "short_sha=$short_sha"
            echo "full_sha=$full_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR with PAT
        if: ${{ env.GHCR_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ env.GHCR_TOKEN }}

      - name: Log in to GHCR with GITHUB_TOKEN
        if: ${{ env.GHCR_TOKEN == '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ steps.prep.outputs.image_name }}:latest
            ${{ env.REGISTRY }}/${{ steps.prep.outputs.image_name }}:${{ steps.prep.outputs.ref_name }}
            ${{ env.REGISTRY }}/${{ steps.prep.outputs.image_name }}:sha-${{ steps.prep.outputs.short_sha }}
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.prep.outputs.full_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
