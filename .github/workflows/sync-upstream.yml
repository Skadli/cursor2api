name: Sync Upstream

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

env:
  TARGET_BRANCH: main
  UPSTREAM_REPOSITORY: 7836246/cursor2api

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.sync.outputs.changed }}

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.TARGET_BRANCH }}

      - name: Configure git identity
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream changes
        id: sync
        shell: bash
        run: |
          set -euo pipefail

          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git" 2>/dev/null || \
            git remote set-url upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"

          git fetch origin "${TARGET_BRANCH}"
          git fetch upstream "${TARGET_BRANCH}"
          git checkout "${TARGET_BRANCH}"
          git reset --hard "origin/${TARGET_BRANCH}"

          before_sha="$(git rev-parse HEAD)"

          if git merge-base --is-ancestor "upstream/${TARGET_BRANCH}" HEAD; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git merge --no-edit "upstream/${TARGET_BRANCH}"
          after_sha="$(git rev-parse HEAD)"

          if [ "$before_sha" = "$after_sha" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git push origin "HEAD:${TARGET_BRANCH}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

  publish:
    needs: sync
    if: needs.sync.outputs.changed == 'true'
    uses: ./.github/workflows/docker-publish.yml
    secrets: inherit
